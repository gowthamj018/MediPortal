# ============================================================
# PROD profile — used when SPRING_PROFILES_ACTIVE=prod (GCP)
# Real SMS is sent via Fast2SMS. API key must be set as an
# environment variable: FAST2SMS_API_KEY=<your_key>
# ============================================================

# SMS — Fast2SMS (real OTP delivery)
app.sms.provider=fast2sms
app.sms.fast2sms.api-key=${FAST2SMS_API_KEY:}

# Tighten logging in production
logging.level.com.mediportal=INFO
logging.level.org.springframework.security=WARN

# Do not show SQL in production
spring.jpa.show-sql=false
